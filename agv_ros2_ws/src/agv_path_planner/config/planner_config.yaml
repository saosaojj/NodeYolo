path_planner:
  ros__parameters:
    map_resolution: 0.05
    map_width: 20.0
    map_height: 20.0
    robot_radius: 0.3
    safe_distance: 0.5
    planning_timeout: 5.0
    max_iterations: 100000
    heuristic_weight: 1.0
    inflation_radius: 0.5
    cost_scaling_factor: 10.0
    replan_interval: 2.0
    bspline_smoothing: true
    path_sample_interval: 0.1
    max_path_length_ratio: 3.0
    max_turn_angle: 1.57
    robot_moved_threshold: 1.0
