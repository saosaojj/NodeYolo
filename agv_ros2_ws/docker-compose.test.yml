version: "3.8"

# =====================================================
# 测试环境配置（仅Web服务，无需ROS硬件）
# =====================================================

services:
  agv_test_web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-web
    image: agv_ros2:test-web
    container_name: agv_test_web
    hostname: agv-test-web
    ports:
      - "8082:8080"
    restart: unless-stopped
    volumes:
      - ./volumes/config:/agv_config
      - ./volumes/data:/agv_data
      - ./volumes/logs:/agv_logs
    environment:
      - AGV_WEB_HOST=0.0.0.0
      - AGV_WEB_PORT=8080
      - AGV_CONFIG_DIR=/agv_config
      - AGV_DATA_DIR=/agv_data
      - AGV_LOG_DIR=/agv_logs
      - DEBUG=true
      - ENABLE_SIMULATION=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

networks:
  default:
    driver: bridge
